# ==============================================================================
# REUSABLE JOB TEMPLATES FOR IM APPS PROJECTS
# Include this file in other repositories to use standardized CI/CD patterns
# ==============================================================================
# NOTE: This file is deprecated. Use GitHub Actions workflows instead.
# See .github/workflows/ for active workflows:
# - lint-test.yml (runs on every push)
# - build-publish.yml (Docker image publishing)
# - npm-publish.yml (npm package publishing, utils only)
# ==============================================================================

stages:
  - ci

variables:
  NODE_VERSION: "22"
  YARN_CACHE_FOLDER: "$CI_PROJECT_DIR/.yarn-cache"

# Cache configuration for faster builds
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .yarn-cache/
    - node_modules/

# ==============================================================================
# UNIVERSAL CI JOB TEMPLATE (Node.js + Bun support)
# ==============================================================================
# This template handles both standard Node.js projects and Bun monorepos.
# Bun is automatically installed via Corepack (Node 18.17+).
#
# Usage in project .gitlab-ci.yml:
#   include:
#     - project: 'imapps/utils'
#       file: 'templates.yml'
#
#   ci:
#     extends: .ci-universal
#
.ci-universal:
  stage: ci
  tags:
    - server
  image: node:22
  variables:
    NODE_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_AUTH_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
  script:
    - yarn lint
    - yarn tsc --noEmit
    - |
      echo "🧪 Running tests for packages..."

      # Check for monorepo
      if [ -f "yarn.lock" ] && grep -q '"workspaces":' package.json 2>/dev/null; then
        echo "📦 Detected monorepo structure"

        if [ -d "packages" ]; then
          for package_dir in packages/*/; do
            package_dir=${package_dir%/}
            if [ -f "${package_dir}/package.json" ]; then
              package_name=$(node -p "require('./${package_dir}/package.json').name" 2>/dev/null || echo "")
              if [ -n "$package_name" ]; then
                if grep -q '"test":' "${package_dir}/package.json"; then
                  echo "✅ Running tests for $package_name..."
                  yarn workspace "$package_name" test
                else
                  echo "⏭️  No tests found for $package_name"
                fi
              fi
            fi
          done
        fi
      else
        echo "📄 Detected single package structure"
        if grep -q '"test":' package.json 2>/dev/null; then
          echo "✅ Running tests..."
          yarn test
        else
          echo "⏭️  No tests defined"
        fi
      fi

