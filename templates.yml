# ==============================================================================
# REUSABLE JOB TEMPLATES FOR IM APPS PROJECTS
# Include this file in other repositories to use standardized CI/CD patterns
# ==============================================================================

stages:
  - ci
  - publish
  - docker-build
  - gitops-update
  - production-deploy

variables:
  NODE_VERSION: "22"
  YARN_CACHE_FOLDER: "$CI_PROJECT_DIR/.yarn-cache"
  PRIVATE_REGISTRY: "192.168.68.54:31834"

# Cache configuration for faster builds
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .yarn-cache/
    - node_modules/

# ==============================================================================
# REUSABLE JOB TEMPLATES
# ==============================================================================

# Reusable CI job template
.ci-template:
  stage: ci
  tags:
    - server
  image: node:22
  variables:
    NODE_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_AUTH_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
  script:
    - yarn lint
    - yarn tsc --noEmit
    - |
      echo "🧪 Running tests for packages with test scripts..."

      # Function to run tests if package has test script
      run_tests_if_exists() {
        local package_path="$1"
        local package_name="$2"

        if [ -f "$package_path/package.json" ]; then
          if grep -q '"test":' "$package_path/package.json"; then
            echo "✅ Running tests for $package_name..."
            if [ -f "yarn.lock" ]; then
              # Monorepo: use workspace command
              yarn workspace "$package_name" test
            else
              # Single repo: run in package directory
              (cd "$package_path" && yarn test)
            fi
          else
            echo "⏭️  No tests found for $package_name"
          fi
        fi
      }

      # Check for different project structures
      if [ -f "yarn.lock" ] && grep -q '"workspaces":' package.json 2>/dev/null; then
        echo "📦 Detected monorepo structure"

        # Dynamically find all packages and run their tests
        if [ -d "packages" ]; then
          for package_dir in packages/*/; do
            # Remove trailing slash for cleaner path handling
            package_dir=${package_dir%/}
            if [ -f "${package_dir}/package.json" ]; then
              # Extract the package name from package.json
              package_name=$(node -p "require('./${package_dir}/package.json').name" 2>/dev/null || echo "")
              if [ -n "$package_name" ]; then
                run_tests_if_exists "$package_dir" "$package_name"
              else
                echo "⚠️  Could not determine package name for ${package_dir}"
              fi
            fi
          done
        else
          echo "⏭️  No packages directory found"
        fi
      else
        echo "📄 Detected single package structure"
        # For single packages, check if root has tests
        if grep -q '"test":' package.json 2>/dev/null; then
          echo "✅ Running tests for root package..."
          yarn test
        else
          echo "⏭️  No tests found in root package"
        fi
      fi

      echo "🎉 Test execution completed!"

# Reusable publish job template
.publish-template:
  stage: publish
  tags:
    - server
  image: node:22
  variables:
    NODE_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_AUTH_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
  script:
    # Determine next version based on git tags
    - |
      set -euo pipefail
      git fetch --tags --force || true

      # Get latest tag matching v*; if none, fall back to root package.json version
      LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
      if [ -n "$LAST_TAG" ]; then
        echo "Last tag: $LAST_TAG"
        BASE=${LAST_TAG#v}
      else
        BASE=$(node -p "require('./package.json').version")
        echo "No tag found. Using root version: $BASE"
      fi

      # Increment patch version
      IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
      PATCH=$((PATCH+1))
      NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

      # Ensure tag uniqueness by incrementing patch until an unused tag is found
      while git rev-parse -q --verify "refs/tags/v${NEW_VERSION}" >/dev/null; do
        PATCH=$((PATCH+1))
        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
      done

      echo "New version: ${NEW_VERSION}"

      # Update root package.json
      npm version "${NEW_VERSION}" --no-git-tag-version

      # Update each workspace version
      for pkg in packages/*; do
        if [ -f "$pkg/package.json" ]; then
          (cd "$pkg" && npm version "${NEW_VERSION}" --no-git-tag-version)
        fi
      done

      echo "Updated all packages to version ${NEW_VERSION}"

    # Update lockfile after version bump
    - YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install --mode=update-lockfile

    # Build packages
    - yarn build

    # Publish workspaces to GitLab Package Registry
    - |
      set -euo pipefail

      # Configure the GitLab Package Registry
      GITLAB_REGISTRY="https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
      echo "Publishing to registry: ${GITLAB_REGISTRY}"

      # List packages that will be published
      echo "=== Packages to be published ==="
      yarn workspaces foreach -A --no-private --topological exec echo "Publishing package at $(pwd)"

      # Ensure all packages are built before publishing
      echo "=== Building all packages ==="
      yarn workspaces foreach -A --no-private run build || echo "Some packages may not have build scripts"

      # Set npm registry for publishing
      npm config set registry ${GITLAB_REGISTRY}
      npm config set //gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken ${CI_JOB_TOKEN}

      # Publish all non-private workspaces in dependency order with error handling
      echo "=== Publishing packages ==="
      yarn workspaces foreach -A --no-private --topological exec sh -c "
        PKG_NAME=\$(node -p \"require('./package.json').name\")
        echo \"=== Publishing \$PKG_NAME from \$(pwd) ===\"
        if npm publish; then
          echo \"✅ Successfully published \$PKG_NAME\"
        else
          echo \"❌ Failed to publish \$PKG_NAME\"
          exit 1
        fi
      "

    # Commit version bump and create tag
    - |
      set -euo pipefail
      NEW_VERSION=$(node -p "require('./package.json').version")
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci@noreply.gitlab.com"
      git add -A
      git commit -m "chore(release): ${NEW_VERSION}" || echo "Nothing to commit"
      git tag "v${NEW_VERSION}"
      git push https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git HEAD:${CI_COMMIT_REF_NAME}
      git push https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git "v${NEW_VERSION}"

# Reusable Docker build job template
.docker-build-template:
  stage: docker-build
  tags:
    - server
  image: docker:27-dind
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
    - echo "Building ${APP_NAME} image"
  script:
    # Generate version tag based on commit SHA
    - export VERSION="${CI_COMMIT_SHORT_SHA}"
    - export IMAGE_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${VERSION}"
    - export LATEST_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:latest"

    # Build the Docker image
    - |
      if [ -n "${BUILD_ARGS:-}" ]; then
        docker build ${BUILD_ARGS} --secret id=CI_JOB_TOKEN,env=CI_JOB_TOKEN -f ${DOCKERFILE_PATH} -t ${IMAGE_TAG} -t ${LATEST_TAG} .
      else
        docker build --secret id=CI_JOB_TOKEN,env=CI_JOB_TOKEN -f ${DOCKERFILE_PATH} -t ${IMAGE_TAG} -t ${LATEST_TAG} .
      fi

    # Push to private registry
    - docker push ${IMAGE_TAG}
    - docker push ${LATEST_TAG}

    # Output version for downstream jobs
    - echo "Built ${APP_NAME} version ${VERSION} and pushed to ${IMAGE_TAG}"

# Reusable GitOps update template
.gitops-update-template:
  stage: gitops-update
  tags:
    - server
  image: alpine:latest
  variables:
    ARGONAUT_REPO: "https://${DEPLOY_USER}:${DEPLOY_TOKEN}@gitlab.com/imapps/argonaut.git"
  before_script:
    - apk add --no-cache git yq
    - git config --global user.name "${DEPLOY_USER}"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
  script:
    # Clone argonaut repository
    - git clone ${ARGONAUT_REPO} argonaut
    - cd argonaut

    # Set version for deployment
    - export VERSION="${CI_COMMIT_SHORT_SHA}"
    - echo "Updating ${PROJECT_NAME} ${ENVIRONMENT} deployment to version ${VERSION}"

    # Process APP_IMAGES if provided
    - |
      if [ -n "${APP_IMAGES:-}" ]; then
        echo "Processing APP_IMAGES: ${APP_IMAGES}"
        echo "${APP_IMAGES}" | tr "," "\n" | while IFS=: read -r app_name image_name; do
          echo "Updating ${app_name} to use image ${image_name}:${VERSION}"
          patch_file="apps/${PROJECT_NAME}/overlays/${ENVIRONMENT}/deployment-${app_name}-patch.yaml"
          mkdir -p "$(dirname "$patch_file")"
          cat > "$patch_file" << EOF
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${PROJECT_NAME}-${app_name}
      spec:
        template:
          spec:
            containers:
            - name: ${PROJECT_NAME}-${app_name}
              image: ${PRIVATE_REGISTRY}/${image_name}:${VERSION}
      EOF
          echo "Created deployment patch: $patch_file"
        done
      else
        echo "No APP_IMAGES provided, skipping image updates"
      fi

    # Commit and push changes
    - git add .
    - 'git commit -m "chore(${PROJECT_NAME}-${ENVIRONMENT}): update to version ${VERSION}" || echo "No changes to commit"'
    - git push origin main

    - echo "✅ Updated ${PROJECT_NAME} ${ENVIRONMENT} deployment to version ${VERSION}"

# Reusable production deployment template (manual)
.production-deploy-template:
  extends: .gitops-update-template
  stage: production-deploy
  variables:
    ENVIRONMENT: "production"
  rules:
    - when: manual
      allow_failure: true
