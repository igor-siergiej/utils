# ==============================================================================
# REUSABLE JOB TEMPLATES FOR IM APPS PROJECTS
# Include this file in other repositories to use standardized CI/CD patterns
# ==============================================================================

stages:
  - ci
  - publish
  - docker-build
  - version-release
  - docker-publish
  - gitops-update
  - production-deploy

variables:
  NODE_VERSION: "22"
  YARN_CACHE_FOLDER: "$CI_PROJECT_DIR/.yarn-cache"
  # Default registry - can be overridden in project's .gitlab-ci.yml
  CI_REGISTRY: "registry.registry.svc.cluster.local:5000"
  PRIVATE_REGISTRY: "$CI_REGISTRY"

# Cache configuration for faster builds
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .yarn-cache/
    - node_modules/

# ==============================================================================
# REUSABLE JOB TEMPLATES
# ==============================================================================

# Reusable CI job template
.ci-template:
  stage: ci
  tags:
    - server
  image: node:22
  variables:
    NODE_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_AUTH_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
  script:
    - yarn lint
    - yarn tsc --noEmit
    - |
      echo "🧪 Running tests for packages with test scripts..."

      # Function to run tests if package has test script
      run_tests_if_exists() {
        local package_path="$1"
        local package_name="$2"

        if [ -f "$package_path/package.json" ]; then
          if grep -q '"test":' "$package_path/package.json"; then
            echo "✅ Running tests for $package_name..."
            if [ -f "yarn.lock" ]; then
              # Monorepo: use workspace command
              yarn workspace "$package_name" test
            else
              # Single repo: run in package directory
              (cd "$package_path" && yarn test)
            fi
          else
            echo "⏭️  No tests found for $package_name"
          fi
        fi
      }

      # Check for different project structures
      if [ -f "yarn.lock" ] && grep -q '"workspaces":' package.json 2>/dev/null; then
        echo "📦 Detected monorepo structure"

        # Dynamically find all packages and run their tests
        if [ -d "packages" ]; then
          for package_dir in packages/*/; do
            # Remove trailing slash for cleaner path handling
            package_dir=${package_dir%/}
            if [ -f "${package_dir}/package.json" ]; then
              # Extract the package name from package.json
              package_name=$(node -p "require('./${package_dir}/package.json').name" 2>/dev/null || echo "")
              if [ -n "$package_name" ]; then
                run_tests_if_exists "$package_dir" "$package_name"
              else
                echo "⚠️  Could not determine package name for ${package_dir}"
              fi
            fi
          done
        else
          echo "⏭️  No packages directory found"
        fi
      else
        echo "📄 Detected single package structure"
        # For single packages, check if root has tests
        if grep -q '"test":' package.json 2>/dev/null; then
          echo "✅ Running tests for root package..."
          yarn test
        else
          echo "⏭️  No tests found in root package"
        fi
      fi

      echo "🎉 Test execution completed!"

# Reusable publish job template
.publish-template:
  stage: publish
  tags:
    - server
  image: node:22
  variables:
    NODE_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_PUBLISH_REGISTRY: "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
    GL_TOKEN: $CI_JOB_TOKEN
    GITLAB_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
  script:
    # Configure GitLab Package Registry for Yarn
    - |
      set -euo pipefail
      GITLAB_REGISTRY="https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
      echo "📦 Publishing to registry: ${GITLAB_REGISTRY}"

      # Configure Yarn registry in .yarnrc.yml
      yarn config set npmPublishRegistry "${GITLAB_REGISTRY}"
      yarn config set npmAuthToken "${CI_JOB_TOKEN}"

    # Build all packages before release
    - yarn build

    # Run semantic-release (handles versioning, changelog, git commits, and tags)
    - |
      set -euo pipefail
      echo "🚀 Running semantic-release for versioning..."
      yarn semantic-release

      echo "✅ Semantic release completed"

    # Manually publish workspace packages to GitLab Package Registry
    - |
      set -euo pipefail
      echo "📦 Publishing workspace packages to GitLab Package Registry..."

      # Publish all non-private workspaces
      yarn workspaces foreach -A --no-private --topological exec bash -c '
        PACKAGE_NAME=$(node -p "require(\"./package.json\").name")
        PACKAGE_VERSION=$(node -p "require(\"./package.json\").version")
        echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}..."

        if yarn npm publish --tolerate-republish; then
          echo "✅ Successfully published ${PACKAGE_NAME}@${PACKAGE_VERSION}"
        else
          echo "❌ Failed to publish ${PACKAGE_NAME}"
          exit 1
        fi
      '

      echo "✅ All packages published successfully"

# Reusable version release template (for apps that don't need npm publishing)
.version-release-template:
  stage: version-release
  tags:
    - server
  image: node:22
  variables:
    GL_TOKEN: $CI_JOB_TOKEN
    GITLAB_TOKEN: $CI_JOB_TOKEN
    SEMANTIC_RELEASE_REPOSITORY_URL: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
  before_script:
    - corepack enable
    - yarn install --immutable
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
    # Configure Git credentials for semantic-release to use HTTPS with token
    - git config --global credential.helper store
    - echo "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com" > ~/.git-credentials
    # Rewrite git:// and git@ URLs to use HTTPS with credentials (prevents SSH key issues)
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "git@gitlab.com:"
    # Rewrite plain HTTPS URLs to include credentials (for semantic-release)
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
    # Switch git remote to HTTPS with CI_JOB_TOKEN for pushing commits/tags
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    # Fetch tags from remote (semantic-release needs them to determine the last release)
    - git fetch origin --tags --force
  script:
    # Run semantic-release (handles versioning, changelog, git commits, and tags)
    - |
      set -euo pipefail
      echo "🚀 Running semantic-release for versioning..."
      yarn semantic-release

      echo "✅ Semantic release completed - version bumped, changelog updated, and tag created"

    # Export version for downstream jobs
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "📦 Released version: ${VERSION}"
      echo "VERSION=${VERSION}" > build.env
      echo "VERSION_TAG=v${VERSION}" >> build.env
  artifacts:
    reports:
      dotenv: build.env

# Reusable version release template with tag cleanup (for monorepo apps)
.version-release-monorepo-template:
  extends: .version-release-template
  before_script:
    - corepack enable
    - yarn install --immutable
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
    - git config --global credential.helper store
    - echo "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com" > ~/.git-credentials
    # Rewrite git:// and git@ URLs to use HTTPS with credentials (prevents SSH key issues)
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "git@gitlab.com:"
    # Rewrite plain HTTPS URLs to include credentials (for semantic-release)
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git fetch origin --tags --force
    # Download and run clean-orphaned-tags script
    - curl -H "PRIVATE-TOKEN:${CI_JOB_TOKEN}" "https://gitlab.com/api/v4/projects/imapps%2Futils/repository/files/scripts%2Fclean-orphaned-tags.sh/raw?ref=main" -o clean-orphaned-tags.sh
    - chmod +x clean-orphaned-tags.sh
    - bash clean-orphaned-tags.sh

.docker-build-template:
  stage: docker-build
  needs:
    - ci
  tags:
    - server
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_DRIVER: overlay2
    GIT_STRATEGY: clone
  before_script:
    - until docker info; do sleep 1; done
    - echo "🐳 Building ${APP_NAME} image for testing"
  script:
    - export IMAGE_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${CI_COMMIT_SHORT_SHA}"

    - echo "🔨 Building Docker image..."
    - |
      if [ -n "${BUILD_ARGS:-}" ]; then
        docker build --network=host ${BUILD_ARGS} \
          --build-arg APP_VERSION=${CI_COMMIT_SHORT_SHA} \
          --secret id=CI_JOB_TOKEN,env=CI_JOB_TOKEN \
          -f ${DOCKERFILE_PATH} -t ${IMAGE_TAG} .
      else
        docker build --network=host \
          --build-arg APP_VERSION=${CI_COMMIT_SHORT_SHA} \
          --secret id=CI_JOB_TOKEN,env=CI_JOB_TOKEN \
          -f ${DOCKERFILE_PATH} -t ${IMAGE_TAG} .
      fi

    - echo "📤 Pushing temporary image to registry..."
    - docker push ${IMAGE_TAG}

    - echo "✅ Built and pushed ${APP_NAME}:${CI_COMMIT_SHORT_SHA} to ${IMAGE_TAG}"

# Reusable Docker publish job template (pulls SHA image, re-tags with version, pushes)
.docker-publish-template:
  stage: docker-publish
  needs:
    - job: version-release
      artifacts: true
  tags:
    - server
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_DRIVER: overlay2
    GIT_STRATEGY: clone
  before_script:
    - until docker info; do sleep 1; done
    - |
      if [ -z "${VERSION:-}" ]; then
        echo "❌ ERROR: VERSION not found. Make sure version-release job runs before this job."
        exit 1
      fi
      echo "📦 Publishing ${APP_NAME} with semantic version: ${VERSION}"
  script:
    - export SHA_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${CI_COMMIT_SHORT_SHA}"
    - export VERSION_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${VERSION}"

    # Pull the previously built image
    - echo "📥 Pulling temporary image..."
    - docker pull ${SHA_TAG}

    # Re-tag with semantic version
    - echo "🏷️  Re-tagging with version ${VERSION}..."
    - docker tag ${SHA_TAG} ${VERSION_TAG}

    # Push to private registry with version tag
    - echo "📤 Pushing versioned image to registry..."
    - docker push ${VERSION_TAG}

    - echo "✅ Published ${APP_NAME}:${VERSION} to ${VERSION_TAG}"

# Reusable Docker publish job template (rebuilds image with semantic version)
# Use this when APP_VERSION build arg needs to be baked into the image
.docker-publish-rebuild-template:
  stage: docker-publish
  needs:
    - job: version-release
      artifacts: true
  tags:
    - server
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - until docker info; do sleep 1; done
    - |
      if [ -z "${VERSION:-}" ]; then
        echo "❌ ERROR: VERSION not found. Make sure version-release job runs before this job."
        exit 1
      fi
      echo "🔨 Building ${APP_NAME} with semantic version: ${VERSION}"
  script:
    - export IMAGE_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${VERSION}"

    # Build the Docker image with semantic version as APP_VERSION
    - echo "🔨 Building Docker image with version ${VERSION}..."
    - docker build --build-arg APP_VERSION=${VERSION} --secret id=CI_JOB_TOKEN,env=CI_JOB_TOKEN -f ${DOCKERFILE_PATH} -t ${IMAGE_TAG} .

    # Push to private registry with semantic version tag
    - echo "📤 Pushing versioned image to registry..."
    - docker push ${IMAGE_TAG}

    - echo "✅ Built and pushed ${APP_NAME}:${VERSION} to ${IMAGE_TAG}"

# ==============================================================================
# BUN-SPECIFIC TEMPLATES
# ==============================================================================

# Cache configuration for Bun
.bun-cache:
  cache:
    key: "${CI_COMMIT_REF_SLUG}-bun"
    paths:
      - .bun-cache/
      - node_modules/

# Reusable CI job template for Bun projects
.ci-bun-template:
  extends: .bun-cache
  stage: ci
  tags:
    - server
  image: ${PRIVATE_REGISTRY}/bun-git:latest
  variables:
    BUN_RUNTIME_TRANSPILER_CACHE_PATH: "$CI_PROJECT_DIR/.bun-cache"
  before_script:
    - bun --version
    - bun install --frozen-lockfile
  script:
    - bun run lint
    - |
      echo "🧪 Running tests if test script exists..."

      if grep -q '"test":' package.json 2>/dev/null; then
        echo "✅ Running tests..."
        bun run test
      else
        echo "⏭️  No tests found in package.json"
      fi

      echo "🎉 CI checks completed!"

# Reusable version release template for Bun projects (no npm publishing)
.version-release-bun-template:
  extends: .bun-cache
  stage: version-release
  tags:
    - server
  image: ${PRIVATE_REGISTRY}/bun-git:latest
  variables:
    GL_TOKEN: $CI_JOB_TOKEN
    GITLAB_TOKEN: $CI_JOB_TOKEN
  before_script:
    - bun --version
    - bun install --frozen-lockfile
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
    # Configure Git credentials for semantic-release to use HTTPS with token
    - git config --global credential.helper store
    - echo "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com" > ~/.git-credentials
    # Switch git remote to HTTPS with CI_JOB_TOKEN for pushing commits/tags
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    # Fetch tags from remote (semantic-release needs them to determine the last release)
    - git fetch origin --tags --force
  script:
    # Run semantic-release (handles versioning, changelog, git commits, and tags)
    - |
      set -euo pipefail
      echo "🚀 Running semantic-release for versioning..."
      bun run release

      echo "✅ Semantic release completed - version bumped, changelog updated, and tag created"

    # Export version for downstream jobs
    - |
      VERSION=$(bun -e "console.log(require('./package.json').version)")
      echo "📦 Released version: ${VERSION}"
      echo "VERSION=${VERSION}" > build.env
      echo "VERSION_TAG=v${VERSION}" >> build.env
  artifacts:
    reports:
      dotenv: build.env

# ==============================================================================
# HELM CHARTS TEMPLATES (For apps using Helm chart deployments)
# ==============================================================================

# Reusable GitOps staging template for Helm charts
.gitops-staging-helm-template:
  stage: gitops-update
  needs:
    - job: version-release
      artifacts: true
  tags:
    - server
  image: alpine:latest
  variables:
    ARGONAUT_REPO: "git@gitlab.com:imapps/argonaut.git"
    ENVIRONMENT: "staging"
  before_script:
    - apk add --no-cache git openssh yq
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
    - |
      if [ -z "${VERSION:-}" ]; then
        echo "❌ ERROR: VERSION not found. Make sure version-release job runs before this job."
        exit 1
      fi
      echo "📦 Deploying Helm chart version ${VERSION} to ${ENVIRONMENT}"
  script:
    # Clone argonaut repository
    - git clone ${ARGONAUT_REPO} argonaut
    - cd argonaut

    # Process HELM_VALUES if provided (format: path/to/values.yaml,image-key-path)
    - |
      if [ -n "${HELM_VALUES:-}" ]; then
        echo "🔄 Processing Helm values: ${HELM_VALUES}"
        echo "${HELM_VALUES}" | tr ';' '\n' | while IFS=',' read -r values_file image_key; do
          echo "   📝 Updating ${image_key} in ${values_file} to version ${VERSION}"

          if [ ! -f "$values_file" ]; then
            echo "❌ ERROR: Values file not found: $values_file"
            exit 1
          fi

          # Check if this is a tag-only update (ends with .tag) or full image update
          if [[ "${image_key}" == *.tag ]]; then
            # Only update the tag field, not the full image
            yq -i ".${image_key} = \"${VERSION}\"" "$values_file"
            echo "   ✅ Updated tag in $values_file"
          else
            # Update full image reference (repository:tag)
            yq -i ".${image_key} = \"${PRIVATE_REGISTRY}/${PROJECT_NAME}:${VERSION}\"" "$values_file"
            echo "   ✅ Updated image in $values_file"
          fi
        done
      fi

    # Also update APP_VERSIONS if provided (format: env-key:path/to/values.yaml)
    - |
      if [ -n "${APP_VERSIONS:-}" ]; then
        echo "🔄 Processing app versions: ${APP_VERSIONS}"
        echo "${APP_VERSIONS}" | tr ';' '\n' | while IFS=':' read -r env_key values_file; do
          echo "   📝 Updating ${env_key} in ${values_file} to version ${VERSION}"

          if [ ! -f "$values_file" ]; then
            echo "❌ ERROR: Values file not found: $values_file"
            exit 1
          fi

          # Update the version field
          yq -i ".${env_key} = \"${VERSION}\"" "$values_file"

          echo "   ✅ Updated $values_file"
        done
      fi

    # Commit and push changes
    - git add .
    - 'git commit -m "chore(${PROJECT_NAME}-${ENVIRONMENT}): deploy Helm chart version ${VERSION}" || echo "No changes to commit"'
    - git push origin main

    - echo "🎉 Successfully deployed ${PROJECT_NAME} Helm chart version ${VERSION}"

