# ==============================================================================
# REUSABLE JOB TEMPLATES FOR IM APPS PROJECTS
# Include this file in other repositories to use standardized CI/CD patterns
# ==============================================================================

stages:
  - ci
  - publish
  - docker-build
  - version-release
  - docker-publish
  - gitops-update
  - production-deploy

variables:
  NODE_VERSION: "22"
  YARN_CACHE_FOLDER: "$CI_PROJECT_DIR/.yarn-cache"
  PRIVATE_REGISTRY: "192.168.68.54:31834"

# Cache configuration for faster builds
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .yarn-cache/
    - node_modules/

# ==============================================================================
# REUSABLE JOB TEMPLATES
# ==============================================================================

# Reusable CI job template
.ci-template:
  stage: ci
  tags:
    - server
  image: node:22
  variables:
    NODE_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_AUTH_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
  script:
    - yarn lint
    - yarn tsc --noEmit
    - |
      echo "🧪 Running tests for packages with test scripts..."

      # Function to run tests if package has test script
      run_tests_if_exists() {
        local package_path="$1"
        local package_name="$2"

        if [ -f "$package_path/package.json" ]; then
          if grep -q '"test":' "$package_path/package.json"; then
            echo "✅ Running tests for $package_name..."
            if [ -f "yarn.lock" ]; then
              # Monorepo: use workspace command
              yarn workspace "$package_name" test
            else
              # Single repo: run in package directory
              (cd "$package_path" && yarn test)
            fi
          else
            echo "⏭️  No tests found for $package_name"
          fi
        fi
      }

      # Check for different project structures
      if [ -f "yarn.lock" ] && grep -q '"workspaces":' package.json 2>/dev/null; then
        echo "📦 Detected monorepo structure"

        # Dynamically find all packages and run their tests
        if [ -d "packages" ]; then
          for package_dir in packages/*/; do
            # Remove trailing slash for cleaner path handling
            package_dir=${package_dir%/}
            if [ -f "${package_dir}/package.json" ]; then
              # Extract the package name from package.json
              package_name=$(node -p "require('./${package_dir}/package.json').name" 2>/dev/null || echo "")
              if [ -n "$package_name" ]; then
                run_tests_if_exists "$package_dir" "$package_name"
              else
                echo "⚠️  Could not determine package name for ${package_dir}"
              fi
            fi
          done
        else
          echo "⏭️  No packages directory found"
        fi
      else
        echo "📄 Detected single package structure"
        # For single packages, check if root has tests
        if grep -q '"test":' package.json 2>/dev/null; then
          echo "✅ Running tests for root package..."
          yarn test
        else
          echo "⏭️  No tests found in root package"
        fi
      fi

      echo "🎉 Test execution completed!"

# Reusable publish job template
.publish-template:
  stage: publish
  tags:
    - server
  image: node:22
  variables:
    NODE_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_AUTH_TOKEN: $CI_JOB_TOKEN
    YARN_NPM_PUBLISH_REGISTRY: "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
    GL_TOKEN: $CI_JOB_TOKEN
    GITLAB_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
  script:
    # Configure GitLab Package Registry for Yarn
    - |
      set -euo pipefail
      GITLAB_REGISTRY="https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
      echo "📦 Publishing to registry: ${GITLAB_REGISTRY}"

      # Configure Yarn registry in .yarnrc.yml
      yarn config set npmPublishRegistry "${GITLAB_REGISTRY}"
      yarn config set npmAuthToken "${CI_JOB_TOKEN}"

    # Build all packages before release
    - yarn build

    # Run semantic-release (handles versioning, changelog, git commits, and tags)
    - |
      set -euo pipefail
      echo "🚀 Running semantic-release for versioning..."
      yarn semantic-release

      echo "✅ Semantic release completed"

    # Manually publish workspace packages to GitLab Package Registry
    - |
      set -euo pipefail
      echo "📦 Publishing workspace packages to GitLab Package Registry..."

      # Publish all non-private workspaces
      yarn workspaces foreach -A --no-private --topological exec bash -c '
        PACKAGE_NAME=$(node -p "require(\"./package.json\").name")
        PACKAGE_VERSION=$(node -p "require(\"./package.json\").version")
        echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}..."

        if yarn npm publish --tolerate-republish; then
          echo "✅ Successfully published ${PACKAGE_NAME}@${PACKAGE_VERSION}"
        else
          echo "❌ Failed to publish ${PACKAGE_NAME}"
          exit 1
        fi
      '

      echo "✅ All packages published successfully"

# Reusable version release template (for apps that don't need npm publishing)
.version-release-template:
  stage: version-release
  tags:
    - server
  image: node:22
  variables:
    GL_TOKEN: $CI_JOB_TOKEN
    GITLAB_TOKEN: $CI_JOB_TOKEN
  before_script:
    - corepack enable
    - yarn install --immutable
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
    # Switch git remote to HTTPS with CI_JOB_TOKEN for pushing commits/tags
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    # Fetch all tags from remote to ensure we have the latest state
    - git fetch --tags --force
  script:
    # Run semantic-release (handles versioning, changelog, git commits, and tags)
    - |
      set -euo pipefail
      echo "🚀 Running semantic-release for versioning..."
      yarn semantic-release

      echo "✅ Semantic release completed - version bumped, changelog updated, and tag created"

    # Export version for downstream jobs
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "📦 Released version: ${VERSION}"
      echo "VERSION=${VERSION}" > build.env
      echo "VERSION_TAG=v${VERSION}" >> build.env
  artifacts:
    reports:
      dotenv: build.env

# Reusable Docker build test job template (builds and pushes with SHA tag)
.docker-build-template:
  stage: docker-build
  needs:
    - ci
  tags:
    - server
  image: docker:27-dind
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    GIT_STRATEGY: clone
  before_script:
    - docker info
    - echo "🐳 Building ${APP_NAME} image for testing"
  script:
    - export IMAGE_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${CI_COMMIT_SHORT_SHA}"

    # Build the Docker image with SHA tag
    - echo "🔨 Building Docker image..."
    - |
      if [ -n "${BUILD_ARGS:-}" ]; then
        docker build ${BUILD_ARGS} --build-arg APP_VERSION=${CI_COMMIT_SHORT_SHA} --secret id=CI_JOB_TOKEN,env=CI_JOB_TOKEN -f ${DOCKERFILE_PATH} -t ${IMAGE_TAG} .
      else
        docker build --build-arg APP_VERSION=${CI_COMMIT_SHORT_SHA} --secret id=CI_JOB_TOKEN,env=CI_JOB_TOKEN -f ${DOCKERFILE_PATH} -t ${IMAGE_TAG} .
      fi

    # Push to private registry with SHA tag (temporary)
    - echo "📤 Pushing temporary image to registry..."
    - docker push ${IMAGE_TAG}

    - echo "✅ Built and pushed ${APP_NAME}:${CI_COMMIT_SHORT_SHA} to ${IMAGE_TAG}"

# Reusable Docker publish job template (pulls SHA image, re-tags with version, pushes)
.docker-publish-template:
  stage: docker-publish
  needs:
    - job: version-release
      artifacts: true
  tags:
    - server
  image: docker:27-dind
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
    - |
      if [ -z "${VERSION:-}" ]; then
        echo "❌ ERROR: VERSION not found. Make sure version-release job runs before this job."
        exit 1
      fi
      echo "📦 Publishing ${APP_NAME} with semantic version: ${VERSION}"
  script:
    - export SHA_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${CI_COMMIT_SHORT_SHA}"
    - export VERSION_TAG="${PRIVATE_REGISTRY}/${APP_NAME}:${VERSION}"

    # Pull the previously built image
    - echo "📥 Pulling temporary image..."
    - docker pull ${SHA_TAG}

    # Re-tag with semantic version
    - echo "🏷️  Re-tagging with version ${VERSION}..."
    - docker tag ${SHA_TAG} ${VERSION_TAG}

    # Push to private registry with version tag
    - echo "📤 Pushing versioned image to registry..."
    - docker push ${VERSION_TAG}

    - echo "✅ Published ${APP_NAME}:${VERSION} to ${VERSION_TAG}"

# Reusable GitOps update template
.gitops-update-template:
  stage: gitops-update
  tags:
    - server
  image: alpine:latest
  variables:
    ARGONAUT_REPO: "git@gitlab.com:imapps/argonaut.git"
  before_script:
    - apk add --no-cache git openssh yq
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
  script:
    # Clone argonaut repository
    - git clone ${ARGONAUT_REPO} argonaut
    - cd argonaut

    # Set version for deployment
    - export VERSION="${CI_COMMIT_SHORT_SHA}"
    - echo "Updating ${PROJECT_NAME} ${ENVIRONMENT} deployment to version ${VERSION}"

    # Process APP_IMAGES if provided
    - |
      if [ -n "${APP_IMAGES:-}" ]; then
        echo "Processing APP_IMAGES: ${APP_IMAGES}"
        echo "${APP_IMAGES}" | tr "," "\n" | while IFS=: read -r app_name image_name; do
          echo "Updating ${app_name} to use image ${image_name}:${VERSION}"
          patch_file="apps/${PROJECT_NAME}/overlays/${ENVIRONMENT}/deployment-${app_name}-patch.yaml"
          mkdir -p "$(dirname "$patch_file")"
          cat > "$patch_file" << EOF
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${PROJECT_NAME}-${app_name}
      spec:
        template:
          spec:
            containers:
            - name: ${PROJECT_NAME}-${app_name}
              image: ${PRIVATE_REGISTRY}/${image_name}:${VERSION}
      EOF
          echo "Created deployment patch: $patch_file"
        done
      else
        echo "No APP_IMAGES provided, skipping image updates"
      fi

    # Commit and push changes
    - git add .
    - 'git commit -m "chore(${PROJECT_NAME}-${ENVIRONMENT}): update to version ${VERSION}" || echo "No changes to commit"'
    - git push origin main

    - echo "✅ Updated ${PROJECT_NAME} ${ENVIRONMENT} deployment to version ${VERSION}"

# Reusable staging GitOps template with versioning
.gitops-staging-template:
  stage: gitops-update
  needs:
    - job: version-release
      artifacts: true
  tags:
    - server
  image: alpine:latest
  variables:
    ARGONAUT_REPO: "git@gitlab.com:imapps/argonaut.git"
    ENVIRONMENT: "staging"
  before_script:
    - apk add --no-cache git openssh yq
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
    - |
      if [ -z "${VERSION:-}" ]; then
        echo "❌ ERROR: VERSION not found. Make sure version-calculation job runs before this job."
        exit 1
      fi
      echo "📦 Deploying version ${VERSION} to ${ENVIRONMENT}"
  script:
    # Clone argonaut repository
    - git clone ${ARGONAUT_REPO} argonaut
    - cd argonaut

    # Process APP_IMAGES if provided
    - |
      if [ -n "${APP_IMAGES:-}" ]; then
        echo "🔄 Processing APP_IMAGES: ${APP_IMAGES}"
        patch_file="apps/${PROJECT_NAME}/overlays/${ENVIRONMENT}/patch-deployment.yaml"

        if [ ! -f "$patch_file" ]; then
          echo "❌ ERROR: Deployment patch file not found: $patch_file"
          exit 1
        fi

        # Update version for each image
        echo "${APP_IMAGES}" | tr ',' '\n' | while IFS=':' read -r app_name image_name; do
          echo "   📝 Updating ${image_name} to version ${VERSION}"
          sed -i "s|image: ${PRIVATE_REGISTRY}/${image_name}:.*|image: ${PRIVATE_REGISTRY}/${image_name}:${VERSION}|g" "$patch_file"
        done

        echo "   ✅ Updated deployment patch: $patch_file"
      else
        echo "⚠️  No APP_IMAGES provided, skipping image updates"
      fi

    # Commit and push changes
    - git add .
    - 'git commit -m "chore(${PROJECT_NAME}-${ENVIRONMENT}): deploy version ${VERSION}" || echo "No changes to commit"'
    - git push origin main

    - echo "🎉 Successfully deployed ${PROJECT_NAME} ${ENVIRONMENT} version ${VERSION}"

# Reusable production deployment template (manual) - uses semantic versions
.production-deploy-template:
  stage: production-deploy
  needs:
    - job: version-release
      artifacts: true
  tags:
    - server
  image: alpine:latest
  variables:
    ARGONAUT_REPO: "git@gitlab.com:imapps/argonaut.git"
    ENVIRONMENT: "production"
  before_script:
    - apk add --no-cache git openssh yq
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - git config --global user.name "gitlab-ci[bot]"
    - git config --global user.email "gitlab-ci@noreply.gitlab.com"
    - |
      if [ -z "${VERSION:-}" ]; then
        echo "❌ ERROR: VERSION not found. Make sure version-calculation job runs before this job."
        exit 1
      fi
      echo "🚀 Deploying version ${VERSION} to ${ENVIRONMENT}"
  script:
    # Clone argonaut repository
    - git clone ${ARGONAUT_REPO} argonaut
    - cd argonaut

    # Process APP_IMAGES if provided
    - |
      if [ -n "${APP_IMAGES:-}" ]; then
        echo "🔄 Processing APP_IMAGES: ${APP_IMAGES}"
        patch_file="apps/${PROJECT_NAME}/overlays/${ENVIRONMENT}/patch-deployment.yaml"

        if [ ! -f "$patch_file" ]; then
          echo "❌ ERROR: Deployment patch file not found: $patch_file"
          exit 1
        fi

        # Update version for each image
        echo "${APP_IMAGES}" | tr ',' '\n' | while IFS=':' read -r app_name image_name; do
          echo "   📝 Updating ${image_name} to version ${VERSION}"
          sed -i "s|image: ${PRIVATE_REGISTRY}/${image_name}:.*|image: ${PRIVATE_REGISTRY}/${image_name}:${VERSION}|g" "$patch_file"
        done

        echo "   ✅ Updated deployment patch: $patch_file"
      else
        echo "⚠️  No APP_IMAGES provided, skipping image updates"
      fi

    # Commit and push changes
    - git add .
    - 'git commit -m "chore(${PROJECT_NAME}-${ENVIRONMENT}): deploy version ${VERSION}" || echo "No changes to commit"'
    - git push origin main

    - echo "🎉 Successfully deployed ${PROJECT_NAME} ${ENVIRONMENT} version ${VERSION}"
  rules:
    - when: manual
      allow_failure: true
