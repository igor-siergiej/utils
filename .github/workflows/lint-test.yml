name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache yarn dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn tsc --noEmit

      - name: Run tests
        run: |
          echo "🧪 Running tests for packages..."

          # Check for monorepo
          if [ -f "yarn.lock" ] && grep -q '"workspaces":' package.json 2>/dev/null; then
            echo "📦 Detected monorepo structure"

            if [ -d "packages" ]; then
              for package_dir in packages/*/; do
                package_dir=${package_dir%/}
                if [ -f "${package_dir}/package.json" ]; then
                  package_name=$(node -p "require('./${package_dir}/package.json').name" 2>/dev/null || echo "")
                  if [ -n "$package_name" ]; then
                    if grep -q '"test":' "${package_dir}/package.json"; then
                      echo "✅ Running tests for $package_name..."
                      yarn workspace "$package_name" test
                    else
                      echo "⏭️  No tests found for $package_name"
                    fi
                  fi
                fi
              done
            fi
          else
            echo "📄 Detected single package structure"
            if grep -q '"test":' package.json 2>/dev/null; then
              yarn test
            else
              echo "⏭️  No tests defined"
            fi
          fi
