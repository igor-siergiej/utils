name: Lint & Test (Reusable)

on:
  workflow_call:
    inputs:
      test-command:
        type: string
        description: 'Test command to run (empty = skip test job)'
        required: false
        default: ''

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    if: ${{ inputs.test-command != '' }}
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: ${{ inputs.test-command }}
