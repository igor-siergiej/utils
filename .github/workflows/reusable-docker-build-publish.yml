name: Docker Build & Publish (Reusable)

on:
  workflow_call:
    inputs:
      services:
        type: string
        required: true
        description: 'JSON array of services, e.g. ["api","web"]'
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(inputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract repo name
        id: repo-name
        run: echo "repo=$(basename ${{ github.repository }})" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            igurusama/imapps:${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}-${{ steps.version.outputs.version }}
            igurusama/imapps:${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}-latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup old Docker images
        uses: igurusama/utils/.github/actions/cleanup-docker-hub@main
        with:
          image: igurusama/imapps
          tag-prefix: ${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
