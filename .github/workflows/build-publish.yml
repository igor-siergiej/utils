name: Build & Publish Docker

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      services:
        type: string
        default: '["api","web"]'
        description: "JSON array of services to build (for monorepo)"
      is-monorepo:
        type: boolean
        default: true
        description: "Whether this is a monorepo (multiple services) or single service"
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      GH_TOKEN:
        required: false
        description: "GitHub token for private package registry access during build"

jobs:
  build-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(inputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract repo name
        id: repo-name
        run: echo "repo=$(basename ${{ github.repository }})" >> $GITHUB_OUTPUT

      - name: Generate Docker tags (monorepo)
        if: inputs.is-monorepo
        id: tags-monorepo
        run: |
          TAGS="${{ secrets.DOCKER_USERNAME }}/imapps:${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}-${{ steps.version.outputs.version }}"
          TAGS="${TAGS},${{ secrets.DOCKER_USERNAME }}/imapps:${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}-latest"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Generate Docker tags (single)
        if: '!inputs.is-monorepo'
        id: tags-single
        run: |
          TAGS="${{ secrets.DOCKER_USERNAME }}/imapps:${{ steps.repo-name.outputs.repo }}-${{ steps.version.outputs.version }}"
          TAGS="${TAGS},${{ secrets.DOCKER_USERNAME }}/imapps:${{ steps.repo-name.outputs.repo }}-latest"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Determine Dockerfile path (monorepo)
        if: inputs.is-monorepo
        id: dockerfile-monorepo
        run: echo "path=./Dockerfile.${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Determine Dockerfile path (single)
        if: '!inputs.is-monorepo'
        id: dockerfile-single
        run: echo "path=./Dockerfile" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.is-monorepo && steps.dockerfile-monorepo.outputs.path || steps.dockerfile-single.outputs.path }}
          push: true
          tags: ${{ inputs.is-monorepo && steps.tags-monorepo.outputs.tags || steps.tags-single.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          build-args: NODE_AUTH_TOKEN=${{ secrets.GH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Published image with tags:"
          echo "${{ inputs.is-monorepo && steps.tags-monorepo.outputs.tags || steps.tags-single.outputs.tags }}"
