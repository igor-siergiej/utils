include:
  - local: 'templates.yml'

stages:
  - ci
  - publish

# CI job - extends the reusable template
ci:
  extends: .ci-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# Package publishing - extends the reusable template
publish:
  extends: .publish-template
  rules:
    - when: manual
      allow_failure: true
  needs:
    - ci